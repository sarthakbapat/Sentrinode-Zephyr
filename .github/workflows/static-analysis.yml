name: Static Analysis and MISRA Checks

on:
  pull_request:
  push:
    branches:
      - main
      - development

jobs:
  cppcheck:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install cppcheck latest
        run: |
          sudo apt-get update

          sudo apt-get install -y \
            git \
            cmake \
            python3 \
            python3-pip \
            build-essential

          git clone https://github.com/danmar/cppcheck.git

          cd cppcheck

          mkdir build
          cd build

          cmake ..

          make -j$(nproc)

          sudo make install

          cppcheck --version

      - name: Create reports directory
        run: |
          mkdir -p reports

      ##########################################################
      # SETUP ZEPHYR ENVIRONMENT
      ##########################################################

      - name: Setup Zephyr environment
        uses: zephyrproject-rtos/action-zephyr-setup@v1
        with:
          toolchains: arm-zephyr-eabi
          use-local-manifest: false

      ##########################################################
      # COPY APP INTO WORKSPACE
      ##########################################################

      - name: Copy app into workspace
        run: |
          mkdir -p zephyrproject/app
          cp -r . zephyrproject/app/

      ##########################################################
      # BUILD FIRMWARE
      ##########################################################

      - name: Build firmware
        run: |
          west build -p always -b disco_l475_iot1 --no-sysbuild .

      ##########################################################
      # GENERATE COMPILE DATABASE
      ##########################################################

      - name: Generate compile database
        run: |
          west build -t compiledb

      ##########################################################
      # STATIC ANALYSIS
      ##########################################################

      - name: Run Cppcheck static analysis
        run: |
          cppcheck \
            --enable=all \
            --inconclusive \
            --std=c11 \
            --language=c \
            --force \
            --inline-suppr \
            --xml \
            --xml-version=2 \
            --suppress=missingIncludeSystem \
            src 2> reports/cppcheck-report.xml

      ##########################################################
      # MISRA CHECKS
      ##########################################################

      - name: Clone cppcheck addons
        run: |
          git clone https://github.com/danmar/cppcheck.git cppcheck_repo

      - name: Run MISRA checks
        run: |
          cppcheck \
            --enable=all \
            --inconclusive \
            --std=c11 \
            --language=c \
            --xml \
            --xml-version=2 \
            --addon=cppcheck_repo/addons/misra.py \
            --suppress=missingIncludeSystem \
            src include 2> reports/misra-report.xml

      ##########################################################
      # UPLOAD ARTIFACTS
      ##########################################################

      - name: Upload XML Reports
        uses: actions/upload-artifact@v4
        with:
          name: static-analysis-xml-reports
          path: |
            reports/cppcheck-report.xml
            reports/misra-report.xml

      - name: Upload HTML Report
        uses: actions/upload-artifact@v4
        with:
          name: static-analysis-html-report
          path: reports/report.html
