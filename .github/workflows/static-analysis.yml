name: Static Analysis and MISRA Checks

on:
  pull_request:
  push:
    branches:
      - main
      - development

jobs:
  cppcheck:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install cppcheck latest
        run: |
          sudo apt-get update

          sudo apt-get install -y \
            git \
            cmake \
            python3 \
            python3-pip \
            build-essential

          git clone https://github.com/danmar/cppcheck.git

          cd cppcheck

          mkdir build
          cd build

          cmake ..

          make -j$(nproc)

          sudo make install

          cppcheck --version

      - name: Create reports directory
        run: |
          mkdir -p reports

      ##########################################################
      # SETUP ZEPHYR ENVIRONMENT
      ##########################################################

      - name: Install west
        run: |
          pip3 install west

      - name: Initialize west workspace
        run: |
          west init -l .
          west update

      - name: Export Zephyr environment
        run: |
          west zephyr-export
          echo "ZEPHYR_BASE=$(west topdir)/zephyr" >> $GITHUB_ENV
          echo "WORKSPACE_DIR=$(west topdir)" >> $GITHUB_ENV

      - name: Install Python dependencies
        run: |
          pip3 install -r $ZEPHYR_BASE/scripts/requirements.txt

      - name: Install Zephyr SDK
        run: |
          cd ~

          wget https://github.com/zephyrproject-rtos/sdk-ng/releases/download/v0.17.0/zephyr-sdk-0.17.0_linux-x86_64_minimal.tar.xz

          tar xf zephyr-sdk-0.17.0_linux-x86_64_minimal.tar.xz

          cd zephyr-sdk-0.17.0

          yes | ./setup.sh -t arm-zephyr-eabi

      ##########################################################
      # EXPORT SDK VARIABLES
      ##########################################################

      - name: Configure Zephyr SDK
        run: |
          echo "ZEPHYR_TOOLCHAIN_VARIANT=zephyr" >> $GITHUB_ENV
          echo "ZEPHYR_SDK_INSTALL_DIR=$HOME/zephyr-sdk-0.17.0" >> $GITHUB_ENV

      ##########################################################
      # BUILD FIRMWARE
      ##########################################################

      - name: Build firmware
        run: |
          west build -p always -b disco_l475_iot1 --no-sysbuild -- -DCMAKE_EXPORT_COMPILE_COMMANDS=ON .

      ##########################################################
      # STATIC ANALYSIS
      ##########################################################

      - name: Run Cppcheck static analysis
        run: |
          cppcheck \
            --project=build/compile_commands.json \
            --enable=all \
            --inconclusive \
            --std=c11 \
            --language=c \
            --force \
            --inline-suppr \
            --xml \
            --xml-version=2 \
            --suppress=missingIncludeSystem \
           2> reports/cppcheck-report.xml

      ##########################################################
      # MISRA CHECKS
      ##########################################################

      - name: Clone cppcheck addons
        run: |
          git clone https://github.com/danmar/cppcheck.git cppcheck_repo

      - name: Run MISRA checks
        run: |
          cppcheck \
            --enable=all \
            --inconclusive \
            --std=c11 \
            --language=c \
            --xml \
            --xml-version=2 \
            --addon=cppcheck_repo/addons/misra.py \
            --suppress=missingIncludeSystem \
            src include 2> reports/misra-report.xml

      ##########################################################
      # UPLOAD ARTIFACTS
      ##########################################################

      - name: Upload XML Reports
        uses: actions/upload-artifact@v4
        with:
          name: static-analysis-xml-reports
          path: |
            reports/cppcheck-report.xml
            reports/misra-report.xml

      - name: Upload HTML Report
        uses: actions/upload-artifact@v4
        with:
          name: static-analysis-html-report
          path: reports/report.html
