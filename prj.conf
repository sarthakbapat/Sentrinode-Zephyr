# Essential config
CONFIG_GPIO=y
CONFIG_SERIAL=y
CONFIG_PRINTK=y
CONFIG_NEWLIB_LIBC=y
CONFIG_PICOLIBC=n
CONFIG_STDOUT_CONSOLE=y


# Required for printing sensor values (float support)
CONFIG_CBPRINTF_FP_SUPPORT=y

# Sensors config
CONFIG_SENSOR=y
CONFIG_I2C=y
CONFIG_HTS221=y
CONFIG_LSM6DSL=y
CONFIG_LSM6DSL_TRIGGER_GLOBAL_THREAD=y      #Trigger = Interrupt mode

# Bluetooth config
CONFIG_BT=y
CONFIG_BT_PERIPHERAL=y
CONFIG_BT_DEVICE_NAME="SentriNode_v1"
CONFIG_BT_GATT_CLIENT=y

# NVS and Flash config
CONFIG_FLASH=y
CONFIG_FLASH_MAP=y
CONFIG_NVS=y
CONFIG_MPU_ALLOW_FLASH_WRITE=y
CONFIG_SOC_FLASH_STM32=y
CONFIG_FLASH_PAGE_LAYOUT=y

# Enable logging
CONFIG_LOG=y
CONFIG_NVS_LOG_LEVEL_DBG=y

# Enable Thread Analyzer
# CONFIG_THREAD_ANALYZER=y
# CONFIG_THREAD_ANALYZER_USE_PRINTK=y
# CONFIG_THREAD_ANALYZER_AUTO=y
# CONFIG_THREAD_ANALYZER_AUTO_INTERVAL=30

